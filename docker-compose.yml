services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  worker:
    build:
      context: .
      args:
        CMD: worker
    environment:
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    deploy:
      replicas: 3

  producer:
    build:
      context: .
      args:
        CMD: producer
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools
